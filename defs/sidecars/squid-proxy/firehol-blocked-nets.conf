# FireHOL-informed destination blocklist defaults for agent egress.
#
# This is a deterministic built-in bogon/private/reserved destination list, not
# a dynamic FireHOL threat feed. It follows FireHOL's documented posture of
# deny-all/allow-some and its guidance that bogons/fullbogons should not route
# on the internet side of a firewall. It also blocks common SSRF targets such as
# cloud metadata and local/private networks.
#
# For dynamic FireHOL IP lists (for example firehol_level1), generate
# /etc/squid/firehol-ipset.conf with update-firehol-ipsets.sh. FireHOL's own
# docs warn that third-party IP lists can have false positives, so those feeds
# remain optional.

acl firehol_blocked_dst dst 0.0.0.0/8
acl firehol_blocked_dst dst 10.0.0.0/8
acl firehol_blocked_dst dst 100.64.0.0/10
acl firehol_blocked_dst dst 127.0.0.0/8
acl firehol_blocked_dst dst 169.254.0.0/16
acl firehol_blocked_dst dst 172.16.0.0/12
acl firehol_blocked_dst dst 192.0.0.0/24
acl firehol_blocked_dst dst 192.0.2.0/24
acl firehol_blocked_dst dst 192.88.99.0/24
acl firehol_blocked_dst dst 192.168.0.0/16
acl firehol_blocked_dst dst 198.18.0.0/15
acl firehol_blocked_dst dst 198.51.100.0/24
acl firehol_blocked_dst dst 203.0.113.0/24
acl firehol_blocked_dst dst 224.0.0.0/4
acl firehol_blocked_dst dst 240.0.0.0/4
acl firehol_blocked_dst dst 255.255.255.255/32
acl firehol_blocked_dst dst ::1/128
acl firehol_blocked_dst dst fc00::/7
acl firehol_blocked_dst dst fe80::/10
acl firehol_blocked_dst dst ff00::/8

http_access deny firehol_blocked_dst
