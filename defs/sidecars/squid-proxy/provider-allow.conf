# Provider allowlist — OPTIONAL, off by default (no-op placeholder).
#
# The egress lifecycle (defs/lib/egress.sh) regenerates this when a provider is
# pinned (PROVEO_EGRESS_PROVIDER) or auto-detected from a present API key.
#
# It serves the two egress-layer purposes without breaking agent research:
#   1. No irreversible action without HITL — the only writes (POST/PUT/PATCH/
#      DELETE) permitted are the inference calls to the pinned provider; writes
#      to any other host stay denied and logged.
#   2. No leaks to providers — inference is pinned to the chosen endpoint, so
#      data can't be POSTed out to an arbitrary host.
# Web READS (GET/HEAD/OPTIONS to docs, search engines, package metadata) ALWAYS
# stay allowed by squid.conf's base policy, so agents can always gather context.
#
# Generated form:
#   acl provider_allow dstdomain|dstdom_regex <pinned provider endpoints>
#   http_access allow unsafe_methods provider_allow
#
# No provider pinned/detected: no rules here; squid.conf keeps its default
# read-allow / write-deny policy.
