# SPEC: _spec/defs/claudecode/claudecode-egress-topology.puml
# Basic Squid configuration for Claude Code egress enforcement.
# Protocol allowlist: HTTP and HTTPS only.
# FTP, SSH, databases, mail, Redis, Docker daemon, and arbitrary raw TCP/UDP
# are intentionally not allowed from the Claude Code container.
#
# HTTPS method/path enforcement requires TLS interception. Without SSL bump,
# Squid can enforce destination host/port for CONNECT tunnels but cannot tell
# whether the encrypted request is GET, POST, publish, upload, etc.

http_port 3128

# Allow local networks (adjust as needed)
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16
acl localnet src fc00::/7
acl localnet src fe80::/10

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT
acl read_methods method GET HEAD OPTIONS
acl unsafe_methods method POST PUT PATCH DELETE

# FireHOL-informed bogon/private/reserved destination deny rules.
include /etc/squid/firehol-blocked-nets.conf

# Optional generated FireHOL blocklist-ipsets ACLs (for example firehol_level1).
# Empty by default; update with update-firehol-ipsets.sh when threat feeds are
# desired and accepted for the deployment's false-positive tolerance.
include /etc/squid/firehol-ipset.conf

# Deny everything outside the web protocol allowlist.
# This blocks FTP (20/21), SSH (22), SMTP (25/465/587), databases
# (5432/3306/6379/etc.), Docker daemon ports, and arbitrary raw protocols.
http_access deny !Safe_ports

# Allow CONNECT only to SSL ports
http_access deny CONNECT !SSL_ports

# Model-provider write allowlist. No-op unless a provider is pinned/detected.
# The egress lifecycle (defs/lib/egress.sh) regenerates this per run with a TIGHT
# per-provider ACL (only the detected provider's inference host, never the rest
# of that vendor's cloud) plus `http_access allow unsafe_methods provider_allow`.
# It is the SOLE write-allow: there is intentionally no static broad provider
# list here — a baked list would silently re-widen the pin to every vendor
# (e.g. a `.googleapis.com` wildcard reopens GCS/Firebase writes). Web reads
# (docs/search/scraping) always stay allowed by the generic read rule below;
# writes to any other host stay denied. Placed after the protocol/port denies
# (which always apply) and after the FireHOL private-range denies above.
include /etc/squid/provider-allow.conf

# Define blocked destinations (publish, push, upload)
acl blocked_sites dstdomain .npmjs.org
acl blocked_sites dstdomain registry.npmjs.org
acl blocked_sites dstdomain pypi.org
acl blocked_sites dstdomain files.pythonhosted.org
acl blocked_sites dstdomain hub.docker.com
acl blocked_sites dstdomain registry-1.docker.io
acl blocked_sites dstdomain gitlab.com
acl blocked_sites dstdomain api.github.com

# Block visible HTTP write methods to sensitive sites and, by default, to any
# non-provider destination. The only write-allow is the generated provider_allow
# include above; everything not matched there is denied here. HTTPS write
# enforcement requires TLS interception (firewall) — in plain proxy
# mode Squid cannot see the method inside a CONNECT tunnel.
http_access deny unsafe_methods blocked_sites
http_access deny unsafe_methods

# Allow HTTP(S) read/search traffic only.
# This intentionally applies to any documentation site, search engine, package
# metadata endpoint, or other read-oriented web destination. Host-specific
# restrictions belong in deny/exception ACLs, not in the general read allowance.
http_access allow CONNECT SSL_ports
http_access allow read_methods
http_access deny all

# Logging
access_log /var/log/squid/access.log
cache_log /var/log/squid/cache.log

# Basic performance settings
maximum_object_size 128 MB
cache_dir ufs /var/spool/squid 100 16 256
coredump_dir /var/spool/squid
