# Optional dynamic FireHOL IP list ACLs.
#
# This file is intentionally empty by default. Populate it with
# update-firehol-ipsets.sh to add a feed such as firehol_level1 from the
# FireHOL blocklist-ipsets project.
#
# Generated files should contain repeated ACL lines such as:
#   acl firehol_ipset dst 1.2.3.0/24
# followed by:
#   http_access deny firehol_ipset
