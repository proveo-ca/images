[tools]
node = "24"
pnpm = "10"

[tasks.install]
description = "Install root workspace dependencies"
run = "pnpm install"

[tasks.test]
description = "Run all project test suites"
dir = "{{config_root}}"
run = """
set -euo pipefail

tests=(
  "apps/cli/public/cli/tests/run_tests.sh"
  "tests/docker-detached-smoke.sh"
  "defs/aider-node/test.sh"
  "defs/cecli/test.sh"
  "defs/charles-proxy/test.sh"
  "defs/claudecode/test.sh"
  "defs/opencode/test.sh"
)

for test_script in "${tests[@]}"; do
  printf '\n==> %s\n' "$test_script"
  "$test_script"
done
"""

[tasks.wrangler-version]
description = "Show the local wrangler version"
run = "pnpm exec wrangler --version"

[tasks.deploy-cli]
description = "Deploy the apps/cli Cloudflare distribution assets with Wrangler"
run = "pnpm exec wrangler deploy --cwd apps/cli"

[tasks.dev-cli]
description = "Run the apps/cli Cloudflare distribution assets locally with Wrangler"
run = "pnpm exec wrangler dev --cwd apps/cli"

[tasks.build]
description = "Build a container harness def"
run = """
#!/usr/bin/env bash
set -euo pipefail
REPO_ROOT="$(pwd)"
DEFAULT_TAG="latest"

source "$REPO_ROOT/apps/cli/public/cli/bin/proveo"
source "$REPO_ROOT/lib/helpers.sh"
source "$REPO_ROOT/lib/runners.sh"
source "$REPO_ROOT/lib/build.sh"

target=""
no_cache=""
tag="$DEFAULT_TAG"

# Parse arguments cleanly, supporting optional target parameter anywhere
while [[ $# -gt 0 ]]; do
  case "$1" in
    --no-cache)
      no_cache="--no-cache"
      shift
      ;;
    --tag)
      if [[ $# -lt 2 ]]; then
        print_error "--tag requires a value"
        exit 1
      fi
      tag="$2"
      shift 2
      ;;
    -*)
      print_error "Unknown build option: $1"
      exit 1
      ;;
    *)
      if [[ -z "$target" ]]; then
        target="$1"
      else
        print_error "Multiple build targets specified: $target and $1"
        exit 1
      fi
      shift
      ;;
  esac
done

# If no target specified, show interactive TUI selector
if [[ -z "$target" ]]; then
  build_options=(
    "all defs (Build everything)"
  )
  for t in "${TARGETS[@]}"; do
    build_options+=("$t")
  done

  printf '\nSelect build target:\n' >&2
  choice=0
  tui_select "${build_options[@]}" || choice=$?

  if [[ $choice -eq 255 ]]; then
    echo "Build cancelled." >&2
    exit 0
  fi

  if [[ $choice -eq 0 ]]; then
    target="all"
  else
    target="${TARGETS[$((choice - 1))]}"
  fi
fi

require_tag "$tag" "build"

if [[ "$target" == "all" ]]; then
  echo "Building all defs..." >&2
  for t in "${TARGETS[@]}"; do
    echo "--- Building $t ---" >&2
    build_target "$t" "$tag" "$no_cache"
  done
else
  require_target "$target"
  build_target "$target" "$tag" "$no_cache"
fi
"""

