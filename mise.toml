[tools]
node = "24"
pnpm = "10"
go = "1.26"

[tasks.install]
description = "Install root workspace dependencies"
run = "pnpm install"

# ── Go CLI ──────────────────────────────────────────────────

[tasks.build-cli]
description = "Install Go proveo CLIs onto GOPATH/bin; pass -- --release for a goreleaser snapshot into dist/"
dir = "{{config_root}}"
run = """
#!/usr/bin/env bash
set -euo pipefail
release=0
while [[ $# -gt 0 ]]; do
  case "$1" in
    --release) release=1; shift ;;
    -h|--help)
      printf 'Usage: mise run build-cli [-- --release]\\n'
      printf '  (default) go install → $(go env GOPATH)/bin\\n'
      printf '  --release also runs goreleaser snapshot → dist/\\n'
      exit 0
      ;;
    *)
      echo "Unknown build-cli option: $1 (want --release)" >&2
      exit 1
      ;;
  esac
done

export CGO_ENABLED=0
# Prefer GOPATH/bin over a toolchain-local GOBIN (mise may set the latter).
export GOBIN="$(go env GOPATH)/bin"
mkdir -p "$GOBIN"
go install -trimpath -ldflags='-s -w -X main.version=dev' ./cmd/proveo
go install -trimpath -ldflags='-s -w' ./cmd/proveo-egress
go install -trimpath -ldflags='-s -w' ./cmd/proveo-entrypoint
printf 'Installed %s/{proveo,proveo-egress,proveo-entrypoint}\\n' "$GOBIN"
printf 'Ensure %s is on PATH (or set PROVEO_BIN).\\n' "$GOBIN"

if [[ "$release" -eq 1 ]]; then
  if ! command -v goreleaser >/dev/null 2>&1; then
    # Pinned (not @latest) so release builds are reproducible; bump deliberately.
    goreleaser_version="v2.17.0"
    echo "goreleaser not on PATH — installing $goreleaser_version via go install..." >&2
    go install "github.com/goreleaser/goreleaser/v2@$goreleaser_version"
    export PATH="$(go env GOPATH)/bin:$PATH"
  fi
  goreleaser release --snapshot --clean
  printf 'Snapshot artifacts under dist/ (gitignored).\\n'
  PROVEO_CDN_REQUIRE_DIST=1 bash scripts/stage-cli-cdn.sh
fi
"""

# ── Tests ───────────────────────────────────────────────────

[tasks.test-go]
description = "Go unit + contract tests with coverage data dir (no Docker / no integration tags)"
dir = "{{config_root}}"
run = "scripts/go-test-coverage.sh unit"

[tasks.test]
description = "Fast gate: Go unit + contract tests (same as test-go)"
depends = ["test-go"]

[tasks.test-go-integration]
description = "Layer 3 egress Docker integration (-tags=integration; needs PROVEO_EGRESS_INTEGRATION=1)"
dir = "{{config_root}}"
run = "scripts/go-test-coverage.sh integration"

[tasks.test-go-e2e]
description = "Layer 4 agent E2E (-tags=e2e; needs PROVEO_LLM_TEST=1)"
dir = "{{config_root}}"
run = "scripts/go-test-coverage.sh e2e"

[tasks.coverage]
description = "Merge GOCOVERDIR profiles and print percent (run test-go first)"
dir = "{{config_root}}"
run = "scripts/go-test-coverage.sh merge"

[tasks.test-images]
description = "Docker/image + consumer CLI suites (needs Docker; slow)"
dir = "{{config_root}}"
run = """
set -euo pipefail
bash scripts/stage-cli-cdn.sh

tests=(
  "apps/cli/public/cli/tests/run_tests.sh"
  "tests/docker-detached-smoke.sh"
  "defs/cecli/test.sh"
  "defs/sidecars/mitmproxy/test.sh"
  "defs/claudecode/test.sh"
  "defs/opencode/test.sh"
  "defs/cursor/test.sh"
)

for test_script in "${tests[@]}"; do
  printf '\\n==> %s\\n' "$test_script"
  "$test_script"
done
"""

[tasks.test-all]
description = "Fast Go gate then Docker/image megasuite"
depends = ["test-go", "test-images"]

# ── Consumer CDN (apps/cli) ─────────────────────────────────

[tasks.wrangler-version]
description = "Show the local wrangler version"
run = "pnpm exec wrangler --version"

[tasks.deploy-cli]
description = "Stage Go CDN binaries then deploy apps/cli Cloudflare assets with Wrangler"
dir = "{{config_root}}"
run = """
#!/usr/bin/env bash
set -euo pipefail
# Publish only real goreleaser artifacts — never the dev cross-compile fallback,
# which would push version=dev binaries to production. Run `mise run build-cli --
# --release` first to populate dist/.
PROVEO_CDN_REQUIRE_DIST=1 bash scripts/stage-cli-cdn.sh
pnpm exec wrangler deploy --cwd apps/cli
"""

[tasks.dev-cli]
description = "Stage Go CDN binaries then run apps/cli Cloudflare assets locally with Wrangler"
dir = "{{config_root}}"
run = """
#!/usr/bin/env bash
set -euo pipefail
bash scripts/stage-cli-cdn.sh
pnpm exec wrangler dev --cwd apps/cli
"""

# ── Harness images (maintainer) ─────────────────────────────

[tasks.build]
description = "Build a container harness def (Go: proveo build)"
dir = "{{config_root}}"
run = """
#!/usr/bin/env bash
set -euo pipefail
# Maintainer image build orchestration is Go now (proveo build -> internal/maintain).
# `go run` keeps it on the current repo source, never a possibly-stale installed
# proveo; the ~1-2s compile is noise next to a docker build.
# Forwards: [target|all] [--tag T] [--no-cache] [--print]
exec go run ./cmd/proveo build "$@"
"""

[tasks.test-defs]
description = "Test a container harness def's image (Go: proveo test)"
dir = "{{config_root}}"
run = """
#!/usr/bin/env bash
set -euo pipefail
exec go run ./cmd/proveo test "$@"
"""

[tasks.deploy]
description = "Deploy a container image def (Go: proveo deploy)"
dir = "{{config_root}}"
run = """
#!/usr/bin/env bash
set -euo pipefail
exec go run ./cmd/proveo deploy "$@"
"""

[tasks.debug]
description = "Debug a container harness def (shell via proveo run --shell)"
depends = ["build-cli"]
run = """
#!/usr/bin/env bash
set -euo pipefail
REPO_ROOT="$(pwd)"
DEFAULT_TAG="latest"

# Prefer the binary just installed by build-cli over a random PATH proveo.
export PATH="$(go env GOPATH)/bin:$PATH"
export PROVEO_BIN="$(command -v proveo)"

source "$REPO_ROOT/lib/ui.sh"
source "$REPO_ROOT/lib/helpers.sh"
source "$REPO_ROOT/lib/registry.sh"

target=""
tag="$DEFAULT_TAG"

# Parse arguments cleanly, supporting optional target parameter
while [[ $# -gt 0 ]]; do
  case "$1" in
    --tag)
      if [[ $# -lt 2 ]]; then
        print_error "--tag requires a value"
        exit 1
      fi
      tag="$2"
      shift 2
      ;;
    --)
      shift
      break
      ;;
    -*)
      print_error "Unknown debug option: $1"
      exit 1
      ;;
    *)
      if [[ -z "$target" ]]; then
        target="$1"
      else
        print_error "Multiple debug targets specified: $target and $1"
        exit 1
      fi
      shift
      ;;
  esac
done

# If no target specified, show interactive TUI selector
if [[ -z "$target" ]]; then
  debug_options=()
  for t in "${TARGETS[@]}"; do
    debug_options+=("$t")
  done

  printf '\\nSelect debug target:\\n' >&2
  choice=0
  tui_select "${debug_options[@]}" || choice=$?

  if [[ $choice -eq 255 ]]; then
    echo "Debug cancelled." >&2
    exit 0
  fi

  target="${TARGETS[$choice]}"
fi

require_tag "$tag" "debug"
require_target "$target"
debug_target "$target" "$tag" "$@"
"""
