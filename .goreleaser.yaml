# Release config for the Go binaries. Produces multi-arch
# static binaries + a sha256 checksums.txt so the installer can verify what it
# downloads — replacing the unverified `curl | bash` pipeline.
# goreleaser check # validate this file
# goreleaser release --snapshot --clean # local dry-run build
version: 2
project_name: proveo

builds:
 - id: proveo
 main: ./cmd/proveo
 binary: proveo
 env: [CGO_ENABLED=0]
 goos: [linux, darwin]
 goarch: [amd64, arm64]
 flags: [-trimpath]
 ldflags:
 - -s -w -X main.version={{ .Version }}
 - id: proveo-egress
 main: ./cmd/proveo-egress
 binary: proveo-egress
 env: [CGO_ENABLED=0]
 goos: [linux, darwin]
 goarch: [amd64, arm64]
 flags: [-trimpath]
 ldflags:
 - -s -w
 - id: proveo-entrypoint
 main: ./cmd/proveo-entrypoint
 binary: proveo-entrypoint
 env: [CGO_ENABLED=0]
 goos: [linux]
 goarch: [amd64, arm64]
 flags: [-trimpath]
 ldflags:
 - -s -w

archives:
 # Full multi-binary tarball (GitHub Releases / maintainer use).
 - id: default
   ids: [proveo, proveo-egress, proveo-entrypoint]
   formats: [tar.gz]
   name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
 # Flat host proveo binaries for Cloudflare CDN staging (install.sh).
 - id: cdn-proveo
   ids: [proveo]
   formats: [binary]
   name_template: "proveo-{{ .Os }}-{{ .Arch }}"

checksum:
 name_template: checksums.txt
 algorithm: sha256

release:
 github:
 owner: proveo-ca
 name: images
