# Shell Registry for Proveo CLI
# This file defines supported shells, their config files, and PATH setup commands.
# Used as the canonical reference for install.sh and documentation.

popular_shells:
  - name: bash
    title: "Bourne Again Shell (bash)"
    supported: true
    config_file:
      darwin: "~/.bash_profile"
      linux: "~/.bashrc"
    path_export_cmd: 'export PATH="<BIN_DIR>:$PATH"'
    reload_cmd: "source <CONFIG_FILE>"

  - name: zsh
    title: "Z Shell (zsh)"
    supported: true
    config_file:
      default: "~/.zshrc"
    path_export_cmd: 'export PATH="<BIN_DIR>:$PATH"'
    reload_cmd: "source <CONFIG_FILE>"

  - name: fish
    title: "Fish Shell (fish)"
    supported: true
    config_file:
      default: "~/.config/fish/config.fish"
    path_export_cmd: 'set -gx PATH "<BIN_DIR>" $PATH'
    reload_cmd: "source <CONFIG_FILE>"

other_supported_shells:
  - name: sh
    title: "POSIX Bourne Shell (sh)"
    supported: true
    config_file:
      default: "~/.profile"
    path_export_cmd: 'PATH="<BIN_DIR>:$PATH"'
    reload_cmd: ". <CONFIG_FILE>"

  - name: ksh
    title: "Korn Shell (ksh)"
    supported: true
    config_file:
      default: "~/.profile"
    path_export_cmd: 'export PATH="<BIN_DIR>:$PATH"'
    reload_cmd: "source <CONFIG_FILE>"

unsupported_shells:
  - name: tcsh
    title: "TENEX C Shell (tcsh)"
    supported: false
    config_file:
      default: "~/.tcshrc"
    path_export_cmd: 'setenv PATH "<BIN_DIR>:$PATH"'
    reload_cmd: "source <CONFIG_FILE>"

  - name: csh
    title: "C Shell (csh)"
    supported: false
    config_file:
      default: "~/.cshrc"
    path_export_cmd: 'setenv PATH "<BIN_DIR>:$PATH"'
    reload_cmd: "source <CONFIG_FILE>"
